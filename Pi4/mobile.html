<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Whip</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#07070e;color:#c0c0e0;font-family:monospace;font-size:14px}
body{display:flex;flex-direction:column;gap:0;padding:0;overflow:hidden}

header{padding:12px 14px 10px;background:#0e0e1a;border-bottom:1px solid #181828;
  display:flex;align-items:center;gap:10px;flex-shrink:0}
.title{flex:1;font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:#4a4a6a}
.dot{width:9px;height:9px;border-radius:50%;background:#2a2a42;transition:all .3s;flex-shrink:0}
.dot.on{background:#3ccc7c;box-shadow:0 0 6px #3ccc7c}
.dot.running{background:#fc9c4c;box-shadow:0 0 6px #fc9c4c}

.scroll{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}

.card{background:#0e0e1a;border:1px solid #181828;border-radius:10px;padding:12px;
  display:flex;flex-direction:column;gap:8px}
.card-label{font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:#4a4a6a}

/* status bar */
.status-row{display:flex;align-items:center;gap:8px;font-size:12px}
.status-name{flex:1;color:#fc9c4c;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.status-step{color:#4a4a6a;font-size:10px;white-space:nowrap}

/* big buttons */
.btn-row{display:flex;gap:8px}
.btn{flex:1;padding:14px 8px;border-radius:8px;border:1px solid #181828;background:#0a0a14;
  color:#c0c0e0;font-family:monospace;font-size:13px;font-weight:600;
  cursor:pointer;text-align:center;user-select:none;transition:all .12s;
  -webkit-user-select:none;active:opacity:.7}
.btn:active{opacity:.6;transform:scale(.97)}
.btn.green{border-color:#2c9c5c;background:#081a10;color:#3ccc7c}
.btn.red{border-color:#9c3c4c;background:#1e0808;color:#fc5c7c}
.btn.accent{border-color:#7c5cfc;background:#180e38;color:#9c7cff}
.btn.dim{opacity:.4;pointer-events:none}

/* toggle row */
.tog-row{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:#b0b0d0}
.tog{position:relative;width:34px;height:19px;border-radius:10px;cursor:pointer;
  background:#22223a;transition:background .15s;flex-shrink:0}
.tog.on{background:#7c5cfc}
.tog::after{content:"";position:absolute;width:13px;height:13px;border-radius:50%;
  background:#07070e;top:3px;left:3px;transition:left .15s}
.tog.on::after{left:18px}

/* sequence list */
.seq-list{display:flex;flex-direction:column;gap:5px;max-height:220px;overflow-y:auto}
.seq-item{display:flex;align-items:center;gap:8px;padding:9px 10px;
  border:1px solid #181828;border-radius:7px;background:#0a0a14;cursor:pointer;
  transition:border-color .12s}
.seq-item.active{border-color:#7c5cfc;background:#0d0a1a}
.seq-item.running{border-color:#fc9c4c;background:#110d08}
.seq-name{flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.seq-run{padding:4px 10px;border-radius:5px;border:1px solid #2c9c5c;background:#081a10;
  color:#3ccc7c;font-size:10px;cursor:pointer;flex-shrink:0}
.seq-run:active{opacity:.6}
.seq-empty{color:#2a2a42;font-size:11px;padding:8px 0;text-align:center}

/* command input */
.cmd-wrap{display:flex;gap:6px}
.cmd-input{flex:1;background:#07070e;border:1px solid #181828;color:#c0c0e0;
  border-radius:6px;padding:9px 10px;font-family:monospace;font-size:13px;
  outline:none}
.cmd-input:focus{border-color:#4a4a6a}
.cmd-send{padding:9px 14px;border-radius:6px;border:1px solid #181828;background:#0e0e1a;
  color:#c0c0e0;font-family:monospace;font-size:12px;cursor:pointer;flex-shrink:0}
.cmd-send:active{opacity:.6}

/* log */
.log{background:#04040a;border:1px solid #0e0e18;border-radius:6px;
  padding:8px;max-height:130px;overflow-y:auto;display:flex;flex-direction:column;gap:2px}
.log-line{font-size:10px;color:#3a3a5a;word-break:break-all;line-height:1.4}
.log-line.hi{color:#7c5cfc}
.log-line.warn{color:#fc9c4c}

.err{font-size:10px;color:#fc5c7c;padding:5px 8px;background:#1e0808;border-radius:5px}

footer{padding:8px 14px;background:#0e0e1a;border-top:1px solid #181828;
  font-size:9px;color:#2a2a42;text-align:center;flex-shrink:0}
</style>
</head>
<body>

<header>
  <span class="title">Whip Control</span>
  <span id="serial-dot" class="dot" title="Serial"></span>
  <span id="ws-dot" class="dot" title="WebSocket"></span>
</header>

<div class="scroll">

  <!-- Status -->
  <div class="card" id="status-card" style="display:none">
    <span class="card-label">Running</span>
    <div class="status-row">
      <span id="status-name" class="status-name"></span>
      <span id="status-step" class="status-step"></span>
    </div>
  </div>

  <!-- Main controls -->
  <div class="card">
    <span class="card-label">Controls</span>
    <div class="btn-row">
      <div class="btn green" id="btn-run" onclick="runSelected()">▶ Run</div>
      <div class="btn red" onclick="stopMotor()">⬛ Stop</div>
    </div>
    <div class="tog-row">
      <span>Loop</span>
      <div class="tog on" id="tog-loop" onclick="toggleLoop()"></div>
    </div>
    <div id="run-err" style="display:none" class="err"></div>
  </div>

  <!-- Sequences -->
  <div class="card">
    <span class="card-label">Sequences</span>
    <div class="seq-list" id="seq-list">
      <span class="seq-empty">Loading…</span>
    </div>
  </div>

  <!-- Direct command -->
  <div class="card">
    <span class="card-label">Send command</span>
    <div class="cmd-wrap">
      <input class="cmd-input" id="cmd-input" placeholder="e.g. speed 2000"
        onkeydown="if(event.key==='Enter')sendCmd()">
      <div class="cmd-send" onclick="sendCmd()">Send</div>
    </div>
    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:2px" id="quick-cmds"></div>
  </div>

  <!-- Log -->
  <div class="card">
    <span class="card-label">Serial log</span>
    <div class="log" id="log"></div>
  </div>

  <!-- Shutdown -->
  <div class="card">
    <span class="card-label">System</span>
    <div id="btn-shutdown" class="btn" style="border-color:#9c3c4c;color:#fc5c7c;background:#1e0808"
      onclick="handleShutdown()">⏻ Shutdown Pi4</div>
    <div id="shutdown-msg" style="display:none;font-size:10px;color:#fc9c4c;text-align:center"></div>
  </div>

</div>
<footer>10.42.0.1:8080 · ws::8081</footer>

<script>
const BASE = `${location.protocol}//${location.hostname}:8080`;
const WS_URL = `ws://${location.hostname}:8081`;

let loopMode = true;
let selectedSeq = null;
let ws = null;
let sequences = [];

// ── WebSocket ─────────────────────────────────────────────────────────────
function connectWS() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => setDot("ws-dot", "on");
  ws.onclose = () => { setDot("ws-dot", false); setTimeout(connectWS, 2000); };
  ws.onerror = () => setDot("ws-dot", false);
  ws.onmessage = e => {
    try { handleMsg(JSON.parse(e.data)); } catch {}
  };
}

function handleMsg(d) {
  setDot("serial-dot", d.serial ? "on" : false);

  const eng = d.engine || {};
  const runCard = document.getElementById("status-card");
  if (eng.running) {
    runCard.style.display = "";
    document.getElementById("status-name").textContent = eng.name || "—";
    document.getElementById("status-step").textContent =
      `${eng.step}/${eng.total}${eng.loop ? " ∞" : ""}`;
  } else {
    runCard.style.display = "none";
  }

  // highlight running sequence in list
  document.querySelectorAll(".seq-item").forEach(el => {
    el.classList.toggle("running", eng.running && el.dataset.name === eng.name);
  });

  // append new serial lines to log
  if (d.lines && d.lines.length) {
    const log = document.getElementById("log");
    d.lines.forEach(line => {
      const div = document.createElement("div");
      div.className = "log-line" +
        (line.toLowerCase().includes("target reached") ? " hi" :
         line.toLowerCase().includes("error") || line.toLowerCase().includes("stop") ? " warn" : "");
      div.textContent = line;
      log.appendChild(div);
    });
    // keep last 80 lines
    while (log.children.length > 80) log.removeChild(log.firstChild);
    log.scrollTop = log.scrollHeight;
  }
}

// ── Sequences ─────────────────────────────────────────────────────────────
async function loadSequences() {
  try {
    const r = await fetch(`${BASE}/api/sequences`);
    sequences = await r.json();
    renderSeqs();
  } catch { }
}

function renderSeqs() {
  const list = document.getElementById("seq-list");
  if (!sequences.length) {
    list.innerHTML = '<span class="seq-empty">No saved sequences.</span>';
    return;
  }
  list.innerHTML = sequences.map(name => `
    <div class="seq-item${name===selectedSeq?" active":""}" data-name="${name}"
      onclick="selectSeq('${name}')">
      <span class="seq-name">${name}</span>
      <div class="seq-run" onclick="event.stopPropagation();runSeq('${name}')">▶ Run</div>
    </div>`).join("");
}

function selectSeq(name) {
  selectedSeq = name;
  renderSeqs();
}

// ── Run / Stop ────────────────────────────────────────────────────────────
async function runSelected() {
  if (!selectedSeq) { showErr("Select a sequence first"); return; }
  await runSeq(selectedSeq);
}

async function runSeq(name) {
  clearErr();
  try {
    const r = await fetch(`${BASE}/api/sequences/${encodeURIComponent(name)}/run`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({loop: loopMode}),
      signal: AbortSignal.timeout(5000),
    });
    if (!r.ok) showErr(`Error ${r.status}`);
  } catch(e) { showErr(e.message || "timeout"); }
}

async function stopMotor() {
  clearErr();
  try {
    await fetch(`${BASE}/api/stop`, {method:"POST", signal:AbortSignal.timeout(3000)});
  } catch(e) { showErr(e.message || "timeout"); }
}

// ── Commands ──────────────────────────────────────────────────────────────
async function sendCmd() {
  const inp = document.getElementById("cmd-input");
  const cmd = inp.value.trim();
  if (!cmd) return;
  try {
    await fetch(`${BASE}/api/cmd?c=${encodeURIComponent(cmd)}`,
      {signal: AbortSignal.timeout(3000)});
    inp.value = "";
  } catch(e) { showErr(e.message || "timeout"); }
}

function quickCmd(c) {
  document.getElementById("cmd-input").value = c;
  sendCmd();
}

// ── Loop toggle ───────────────────────────────────────────────────────────
function toggleLoop() {
  loopMode = !loopMode;
  document.getElementById("tog-loop").classList.toggle("on", loopMode);
}

// ── Helpers ───────────────────────────────────────────────────────────────
function setDot(id, state) {
  const d = document.getElementById(id);
  d.className = "dot" + (state ? " " + state : "");
}
function showErr(msg) {
  const e = document.getElementById("run-err");
  e.textContent = msg; e.style.display = "";
  setTimeout(()=>e.style.display="none", 4000);
}
function clearErr() { document.getElementById("run-err").style.display="none"; }

// ── Shutdown ──────────────────────────────────────────────────────────────
let shutdownArmed = false, shutdownTimer = null;
function handleShutdown() {
  if (!shutdownArmed) {
    shutdownArmed = true;
    document.getElementById("btn-shutdown").textContent = "Tap again to confirm";
    shutdownTimer = setTimeout(() => {
      shutdownArmed = false;
      document.getElementById("btn-shutdown").textContent = "⏻ Shutdown Pi4";
    }, 3000);
  } else {
    clearTimeout(shutdownTimer);
    shutdownArmed = false;
    doShutdown();
  }
}
async function doShutdown() {
  const btn = document.getElementById("btn-shutdown");
  const msg = document.getElementById("shutdown-msg");
  btn.textContent = "Shutting down…";
  btn.style.opacity = "0.5";
  btn.style.pointerEvents = "none";
  try {
    await fetch(`${BASE}/api/shutdown`, {method:"POST", signal:AbortSignal.timeout(5000)});
    msg.textContent = "Pi4 is shutting down. Wait ~10s before pulling power.";
    msg.style.display = "";
  } catch {
    msg.textContent = "Shutdown sent (or connection lost).";
    msg.style.display = "";
  }
}

// ── Init ──────────────────────────────────────────────────────────────────
// Render quick command chips
(function(){
  const cmds = ["stop","reset","on","off","left","right","move 0","calibrate"];
  const wrap = document.getElementById("quick-cmds");
  cmds.forEach(c => {
    const el = document.createElement("div");
    el.textContent = c;
    el.style.cssText = "padding:4px 8px;border:1px solid #181828;border-radius:5px;" +
                       "font-size:10px;cursor:pointer;color:#4a4a6a";
    el.addEventListener("click", () => quickCmd(c));
    wrap.appendChild(el);
  });
})();

connectWS();
loadSequences();
setInterval(loadSequences, 5000);
</script>
</body>
</html>
